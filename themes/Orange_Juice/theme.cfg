<Eterm-0.9.2>

begin color
  foreground  #aaaaaa
  background  #000000
  cursor      #bbbbbb
  cursor_text #202020
  pointer black
  video normal
    color  0 #000000
    color  1 #aa0000
    color  2 #00aa00
    color  3 #aa5500
    color  4 #0000aa
    color  5 #aa00aa
    color  6 #00aaaa
    color  7 #aaaaaa
    color  8 #555555
    color  9 #ff5555
    color 10 #55ff55
    color 11 #ffff55
    color 12 #5555ff
    color 13 #ff55ff
    color 14 #55ffff
    color 15 #ffffff
    color bd #ffffff
end color

begin attributes
  name "%appname()"
  font default 4
  font 0 5x7
  font 1 6x10
  font 2 fixed
  font 3 bright
  font 4 nexus
  font 5 10x20
  font 6 12x24
  font fx shadow br #141414
end attributes

begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode image allow image trans viewport auto
    state normal
    file bg.jpg
    geom 100
    border 5 5 5 5
  end image
  begin image
    type trough
    mode image allow image trans viewport auto
    state normal
    file trough.png
    geom 100
    border 2 2 2 2
  end image
  begin image
    type anchor
    mode image allow image auto
    state normal
    file anchor.png
    geom 100
    border 4 4 4 4
  end image
  begin image
    type up_arrow
    mode image allow image auto
    state normal
    file uparrow_fg.png
    geom 100
    state clicked
    file uparrow_cl.png
    geom 100
  end image
  begin image
    type down_arrow
    mode image allow image auto
    state normal
    file downarrow_fg.png
    geom 100
    state clicked
    file downarrow_cl.png
    geom 100
  end image
  begin image
    type left_arrow
    mode image allow image auto
    state normal
    file leftarrow_fg.png
    geom 100
    state clicked
    file leftarrow_cl.png
    geom 100
  end image
  begin image
    type right_arrow
    mode image allow image auto
    state normal
    file rightarrow_fg.png
    geom 100
    state clicked
    file rightarrow_cl.png
    geom 100
  end image
  begin image
    type menu
    mode image allow image auto
    state normal
    color black white
    file menubg.png
    geom 100
    border 4 4 4 4
    state selected
    file menu_bar.png
    geom 100
    border 3 3 3 3
  end image
  begin image
    type submenu
    mode image allow image auto
    state normal
    color black white
        file menu_arrow.png
    geom 100
    border 3 13 3 3
    padding 8 18 4 2
    state selected
    file menu_bar_arrow.png
    geom 100
    border 3 13 3 3
    padding 8 18 4 2
  end image
  begin image
    type button_bar
    mode image allow image auto
    state normal
    color black white 
    file menubg.png
    geom 100
    border 3 3 3 3
  end image
  begin image
    type button
    mode image allow image auto
    state normal
    color black white 
    file menu_bar.png
    geom 100
    border 3 3 3 3
  end image
end

%include "menus.cfg"

begin actions
  bind ctrl button1 to string "\e]5;\a"
  bind ctrl button2 to string "\e[?30t"
  bind ctrl button3 to menu Eterm
  bind ctrl shift button3 to string "\e]6;14\a"
end actions

begin button_bar
    font "-adobe-helvetica-medium-r-normal--10-100-75-75-p-56-iso8859-1"
    button Eterm action menu "Eterm Operations"
    button Font action menu Font
    button Background action menu Background
    button Terminal action menu Terminal
    rbutton icon help.png action script "spawn(Eterm -e man Eterm)"
    rbutton icon exit.png action script "exit"
end button_bar

begin toggles
  map_alert on
  visual_bell off
  login_shell true
  scrollbar on
  utmp_logging on
#  meta8 false
  iconic false
  home_on_output 1
  home_on_input 1
  scrollbar_right true
  scrollbar_floating false
  borderless false
end toggles

begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard

begin misc
#  print_pipe "lpr"
  save_lines 1024
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
#  line_space 2
  term_name Eterm
end misc
