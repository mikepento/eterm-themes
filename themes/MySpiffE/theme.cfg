<Eterm-0.9.2>

begin color
  foreground black
  background #cccccc
  cursor black
  cursor_text #666666
  pointer black
  video normal
  color  0 grey50 
  color  1 red3
  color  2 green4
  color  3 yellow2
  color  4 blue3
  color  5 magenta3
  color  6 cyan2
  color  7 antiquewhite
  color  8 grey90
  color  9 #800000
  color 10 #005020
  color 11 #995500
  color 12 #004080
  color 13 #443300
  color 14 #306080
  color 15 white
  color bd #ffffff
end color

begin attributes
  name "%appname()"
  font default 4
  font 0 5x7
  font 1 6x10
  font 2 fixed
  font 3 bright
  font 4 shine
  font 5 10x20
  font 6 12x24
  font fx none
end attributes

begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode image allow image trans viewport auto
    state normal
    file bg.png
    geom 100
    border 5 5 5 5
  end image
  begin image
    type trough
    mode image allow image trans viewport auto
    state normal
    file trough.png
    geom 100
    border 2 2 2 2
  end image
  begin image
    type anchor
    mode image allow image auto
    state normal
    file anchor_fg.png
    geom 100
    border 2 2 2 2
    state selected
    file anchor_hl.png
    geom 100
    border 2 2 2 2
  end image
  begin image
    type up_arrow
    mode image allow image auto
    state normal
    file uparrow_fg.png
    geom 100
    state selected
    file uparrow_hl.png
    geom 100
    state clicked
    file uparrow_cl.png
    geom 100
  end image
  begin image
    type down_arrow
    mode image allow image auto
    state normal
    file downarrow_fg.png
    geom 100
    state selected
    file downarrow_hl.png
    geom 100
    state clicked
    file downarrow_cl.png
    geom 100
  end image
  begin image
    type left_arrow
    mode image allow image auto
    state normal
    file leftarrow_fg.png
    geom 100
    state selected
    file leftarrow_hl.png
    geom 100
    state clicked
    file leftarrow_cl.png
    geom 100
  end image
  begin image
    type right_arrow
    mode image allow image auto
    state normal
    file rightarrow_fg.png
    geom 100
    state selected
    file rightarrow_hl.png
    geom 100
    state clicked
    file rightarrow_cl.png
    geom 100
  end image
  begin image
    type menu
    mode image allow image auto
    state normal
    color black white
    file menubg.png
    geom 100
    border 8 8 8 8
    state selected
    file menu_selected.png
    geom 100
    border 3 3 3 3
  end image
  begin image
    type submenu
    mode image allow image auto
    state normal
    color black white
        file submenu.png
    geom 100
    border 3 8 3 3
    padding 0 13 0 0
    state selected
    file submenu_selected.png
    geom 100
    border 3 8 3 3
    padding 0 13 0 0
  end image
  begin image
    type button_bar
    mode image allow image auto
    state normal
    color black white 
    file menubg.png
    geom 100
    border 3 3 3 3
  end image
  begin image
    type button
    mode image allow image auto
    state normal
    color black white 
    file menu_selected.png
    geom 100
    border 3 3 3 3
  end image
end

%include "menus.cfg"

begin actions
  bind ctrl button1 to string "\e]5;\a"
  bind ctrl button2 to string "\e[?30t"
  bind ctrl button3 to menu Eterm
  bind ctrl shift button3 to string "\e]6;14\a"
end actions

begin button_bar
  font "variable"
  button Eterm action menu "Eterm Operations"
  button Font action menu Font
  button Background action menu Background
  button Terminal action menu Terminal
  rbutton Help action script "spawn(Eterm -e man Eterm)"
  rbutton Exit action script "exit"
end button_bar

begin toggles
  map_alert on
  visual_bell off
  login_shell true
  scrollbar on
  utmp_logging on
#  meta8 false
  iconic false
  home_on_output 1
  home_on_input 1
  scrollbar_right true
  scrollbar_floating false
  borderless false
end toggles

begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard

begin misc
#  print_pipe "lpr"
  save_lines 1024
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
#  line_space 2
  term_name Eterm
end misc
