<Eterm-0.9.2>
  begin color
    foreground #aaaaaa
    background black
    cursor #ffff00
    cursor_text #880000
    pointer white
    video normal
    color  0 0    0    0
    color  1 0xaa 0    0
    color  2 0    0210 0
    color  3 0xaa 0x55 0x22
    color  4 0    0    0xaa
    color  5 0xaa 0    0xaa
    color  6 0    0xaa 0xaa
    color  7 0xaa 0xaa 0xaa
    color  8 0x44 0x44 0x44
    color  9 0xff 0x44 0x44
    color 10 0x44 0xff 0x44
    color 11 0xff 0xff 0x44
    color 12 0x44 0x44 0xff
    color 13 0xff 0x44 0xff
    color 14 0x44 0xff 0xff
    color 15 #ffffff
    color bd #ffffff
    color ul #ffffff
  end color

  begin attributes
    title "%appname() - StarEnli"
    name "%appname() - StarEnli" 
    font default 2
    font 0 5x7
    font 1 6x10
    font 2 fixed
    font 3 8x13
    font 4 9x15
    font 5 10x20
    font 6 12x24
  end attributes

  begin imageclasses
    path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
    begin image
      type background
      mode image allow image trans viewport auto
      state normal
      file bg.png
      geom :tiled
      border 0 0 0 0
    end image
    begin image
      type trough
      mode image allow image trans viewport auto
      state normal
      file t.png
      geom 100
      border 2 2 2 3
    end image
    begin image
      type anchor
      mode image allow image auto
      state normal
      file sb1.png
      geom 100
      border 2 2 2 2
      state selected
      file sb2.png
      geom 100
      border 2 2 2 2  
      state clicked
      file sb2.png
      geom 100
      border 2 2 2 2
    end image
    begin image
      type thumb
      mode image allow image auto
      state normal
      file sbt1.png
      border 3 3 3 3
      geom 100
      state selected
      file sbt2.png
      border 3 3 3 3
      geom 100
      state clicked
      file sbt2.png
      border 3 3 3 3
      geom 100
    end image  
    begin image
      type up_arrow
      mode image allow image auto
      state normal
      file a_u_1.png
      geom :scale
      state clicked
      file a_u_2.png
      geom :scale
    end image
    begin image
      type down_arrow
      mode image allow image auto
      state normal
      file a_d_1.png
      geom :scale
      state clicked
      file a_d_2.png
      geom :scale
    end image
    begin image
      type left_arrow
      mode image allow image auto
      state normal
      file a_l_1.png
      geom :scale
      state clicked
      file a_l_2.png
      geom :scale
    end image
    begin image
      type right_arrow
      mode image allow image auto
      state normal
      file a_r_1.png
      geom :scale
      state clicked
      file a_r_2.png
      geom :scale
    end image
    begin image
      type menu
      mode image allow image auto
      state normal
      file bt.png
      geom 100
      border 2 3 2 3 
      state selected
      file bt.png
      geom 100
      border 2 3 2 3
    end image
    begin image
      type submenu
      mode image allow image auto
      state normal
      file mb3.png
      geom 100x100+0+0:scale
      border 6 22 1 1
      padding 6 22 1 1
      state selected
      file mb2.png
      geom 100x100+0+0:scale
      border 6 22 1 1
      padding 6 22 1 1
      state clicked
      file mb2.png
      geom 100x100+0+0:scale
      border 6 22 1 1
      padding 6 22 1 1
    end image
    begin image
      type button_bar
      mode image allow image auto
      state normal
      file bt_h.png
      geom 100
      border 2 3 2 2
      state disabled
      color white #333333
      border 2 3 2 2
# uncomment the line below if you want the menu bar to darken somewhat when
# it is in disabled mode
#      cmod image 0xc0   
    end image
    begin image 
      type button
      mode image allow image auto
      state normal
      file bt_h.png
      geom 100
      border 2 3 2 2
      state selected
      file bt_h.png
      geom 100
      border 2 3 2 2 
      state clicked
      file bt_h.png
      geom 100
      border 2 3 2 2 
    end image
  end
	  
%include "menus.cfg"

  begin actions
    bind ctrl button1 to string "\e]5;\a"
    bind ctrl button2 to string "\e[?30t"
    bind ctrl button3 to menu Eterm
    bind anymod 0xffbe to menu Eterm
  end actions

#  begin multichar
#    font 0 k14
#    font 1 jiskan16
#    font 2 jiskan18
#    font 3 jiskan24
#    font 4 jiskan26
#    encoding eucj
#  end multichar

  begin button_bar
    font "-adobe-helvetica-medium-r-normal--10-100-75-75-p-56-iso8859-1"
    button Eterm action menu "Eterm Operations"
    button Font action menu Font
    button Background action menu Background
    button Terminal action menu Terminal
    rbutton icon help.png action script "spawn(Eterm -e man Eterm)"
    rbutton icon exit.png action script "exit"
  end button_bar

#  begin xim
#    input_method Ami
#    preedit_type OverTheSpot
#  end xim

  begin toggles
    map_alert on
    visual_bell off
    login_shell true
    scrollbar on
    utmp_logging on
    select_line false
#    meta8 false
    iconic false
    home_on_output 1
    home_on_input 1
    scrollbar_right true
    scrollbar_floating false
    borderless false
  end toggles

  begin keyboard
    smallfont_key LessThan
    bigfont_key GreaterThan
  end keyboard

  begin misc
#    print_pipe "lpr"
    save_lines 1024
    cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
    border_width 5
#    line_space 2
  end misc
