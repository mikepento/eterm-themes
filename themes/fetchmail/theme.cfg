<Eterm-0.9.2>

begin color
  foreground #aaaaaa
  background black
  cursor #ffff00
  cursor_text #880000
  pointer white
  video normal
end color

begin attributes
  title "%appname() -- Fetchmail Theme"
  name Eterm-fetchmail
  font default 0
end attributes

begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode trans allow image trans viewport auto
    state normal
    file %random(`cat pixmaps.list`)
  end image
  begin image
    type trough
    mode trans allow image trans viewport auto
    state normal
    file bar_vertical_3.png
    geom 100
    border 3 3 2 2
  end image
  begin image
    type anchor
    mode image allow image auto
    state normal
    file bar_vertical_1.png
    geom 100
    border 3 3 2 2
    state selected
    file bar_vertical_2.png
    geom 100
    border 3 3 2 2
  end image
  begin image
    type up_arrow
    mode image allow image auto
    state normal
    file button_arrow_up_1.png
    geom 100
    border 2 2 2 2
    state selected
    file button_arrow_up_2.png
    geom 100
    border 2 2 2 2
    state clicked
    file button_arrow_up_3.png
    geom 100
    border 2 2 2 2
  end image
  begin image
    type down_arrow
    mode image allow image auto
    state normal
    file button_arrow_down_1.png
    geom 100
    border 2 2 2 2
    state selected
    file button_arrow_down_2.png
    geom 100
    border 2 2 2 2
    state clicked
    file button_arrow_down_3.png
    geom 100
    border 2 2 2 2
  end image
  begin image
    type menu
    mode image allow image auto
    state normal
    color black #999999
    file bar_horizontal_1.png
    geom 100
    border 3 3 2 2
    state selected
    file bar_horizontal_2.png
    geom 100
    border 3 3 2 2
  end image
  begin image
    type submenu
    mode image allow image auto
    state normal
    color black #999999
    file menu1.png
    geom 100
    border 3 15 3 3
    padding 3 15 3 3
    state selected
    file menu2.png
    geom 100
    border 3 15 3 3
    padding 3 15 3 3
    state clicked
    file menu3.png
    geom 100
    border 3 15 3 3
    padding 3 15 3 3
  end image
end

%include "menus.cfg"

begin actions
  bind ctrl button1 to string "\e]5;\a"
  bind ctrl button2 to string "\e[?30t"
  bind ctrl button3 to menu Eterm
  bind ctrl shift button3 to string "\e]6;14\a"
end actions

begin toggles
  map_alert on
  visual_bell on
  scrollbar_right true
  scrollbar_floating true
  scrollbar_popup true
  borderless true
  no_cursor true
  double_buffer true
end toggles

begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard

begin misc
  save_lines 64
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
  term_name Eterm
  exec fetchmail -N
end misc
