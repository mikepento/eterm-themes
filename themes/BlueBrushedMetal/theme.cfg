<Eterm-0.9.2>
  begin color
    foreground #aaaaaa
    background black
    cursor #ffff00
    cursor_text #880000
    pointer white
    video normal
  end color

  begin attributes
    title "%appname() - BlueBrushedMetal Theme"
    name "%appname() - BlueBrushedMetal Theme"
    font default 2
  end attributes

  begin imageclasses
    path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/local/share/Eterm/pix/"
    begin image
      type background
      mode image allow image trans viewport auto
      state normal
      file bg.jpg@0x0+0+0:tile
      border 0 0 0 0
    end image
    begin image
      type trough
      mode image allow image trans viewport auto
      state normal
      file t.png
      geom 100
      border 4 2 4 2
      state disabled
      color white #333333
      border 4 2 4 2 
      cmod  image 0xc0
    end image
    begin image
      type anchor
      mode image allow image auto
      state normal
      file sb1.png
      geom 100
      border 2 2 2 2
      state clicked
      file sb2.png
      geom 100
      border 2 2 2 2
    end image
    begin image
      type thumb
      mode image allow image auto
      state normal
      color black #666666
      file thumb_1.png
      geom 100
      border 3 3 3 3 
      state selected
      file thumb_2.png
      geom 100
      border 3 3 3 3 
    end image
    begin image
      type up_arrow
      mode image allow image auto
      state normal
      file a_u_1.png
      geom 100
      state clicked
      file a_u_2.png
      geom 100
    end image
    begin image
      type down_arrow
      mode image allow image auto
      state normal
      file a_d_1.png
      geom 100
      state clicked
      file a_d_2.png
      geom 100
    end image
    begin image
      type left_arrow
      mode image allow image auto
      state normal
      file a_l_1.png
      geom 100
      state clicked
      file a_l_2.png
      geom 100
    end image
    begin image
      type right_arrow
      mode image allow image auto
      state normal
      file a_r_1.png
      geom 100
      state clicked
      file a_r_2.png
      geom 100
    end image
    begin image
      type menu
      mode image allow image auto
      state normal
      file bt.png
      geom 100
      border 4 4 4 4
    end image
    begin image
      type submenu
      mode image allow image auto
      state normal
      file mb3.png
      geom 100x100+0+0100
      border 6 22 1 1
      padding 6 22 1 1
      state selected
      file mb2.png
      geom 100x100+0+0100
      border 6 22 1 1
      padding 6 22 1 1
      state clicked
      file mb2.png
      geom 100x100+0+0100
      border 6 22 1 1
      padding 6 22 1 1
    end image  
    begin image
      type button_bar
      mode image allow image auto
      state normal
      file bt.png
      geom 100
      border 2 3 2 2
      state disabled
      color white #333333
      border 2 3 2 2 
      cmod image 0xc0
    end image
    begin image
      type button
      mode image allow image auto
      state normal
      file bt.png
      geom 100
      border 2 3 2 2 
      end image
  end

%include "menus.cfg"

  begin actions
    bind ctrl button1 to string "\e]5;\a"
    bind ctrl button2 to string "\e[?30t"
    bind ctrl button3 to menu Eterm
    bind ctrl shift button3 to string "\e]6;14\a"
    bind anymod 0xffbe to menu Eterm
  end actions

  begin button_bar
    font "-adobe-helvetica-medium-r-normal--10-100-75-75-p-56-iso8859-1"
    button Eterm action menu "Eterm Operations"
    button Font action menu Font
    button Background action menu Background
    button Terminal action menu Terminal
    button Help action script "spawn(Eterm -e man Eterm)"
  end button_bar

