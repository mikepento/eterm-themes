<Eterm-0.9.2>

begin color
  foreground #aaaaaa
  background black
  cursor #ffffff
  cursor_text #000000
  pointer white
  video normal
end color

begin attributes
  name "%appname() -- Xterm Theme"
  scrollbar_type xterm
  scrollbar_width 15
  font default 2
  font 0 5x7
  font 1 6x10
  font 2 fixed
  font 3 8x13
  font 4 9x15
  font 5 10x20
  font 6 12x24
end attributes

begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode solid
  end image
  begin image
    type trough
    mode solid
    state normal
  end image
  begin image
    type anchor
    mode solid
    state normal
    color white #999999
  end image
  begin image
    type menu
    mode solid
    state normal
    color white #333333
    state selected
    color white #666666
  end image
  begin image
    type submenu
    mode solid
    state normal
    color white black
    state selected
    color white #666666
  end image
end

%include "menus.cfg"

begin actions
  bind ctrl button1 to menu "Eterm Options"
  bind ctrl button2 to menu "Terminal Options"
  bind ctrl button3 to menu Font
end actions

