begin toggles
  map_alert on
  visual_bell off
  login_shell true
  scrollbar on
  utmp_logging on
  iconic false
  home_on_output 1
  home_on_input 1
  scrollbar_right 0
  scrollbar_floating false
  borderless false
  xterm_select 1
  select_line 1
  select_trailing_spaces 1
end toggles

begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard

begin misc
  save_lines 1024
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
  term_name Eterm
end misc
