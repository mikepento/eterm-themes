<Eterm-0.9.2>

begin color
  foreground #aaaaaa
  background black
  cursor #ffff00
  cursor_text #880000
  pointer white
  video normal
end color

begin attributes
  name "%appname() -- nIx Theme"
  font default 2
  font 0 5x7
  font 1 6x10
  font 2 fixed
  font 3 8x13
  font 4 9x15
  font 5 10x20
  font 6 12x24
end attributes

begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode image allow image trans viewport auto
    state normal
    file 6c.jpg
#      file b6.jpg
    geom 100
  end image
  begin image
    type trough
    mode image allow image trans viewport auto
    state normal
    file A_b_close1.png
    geom 100
    border 4 2 4 2
  end image
  begin image
    type anchor
    mode image allow image auto
    state normal
    file A_b_button.png
    geom 100
    border 2 2 2 2
  end image
  begin image
    type up_arrow
    mode image allow image auto
    state normal
    file button_arrow_up_1.png
    geom 100
    state clicked
    file button_arrow_up_2.png
    geom 100
  end image
  begin image
    type down_arrow
    mode image allow image auto
    state normal
    file button_arrow_down_1.png
    geom 100
    state clicked
    file button_arrow_down_2.png
    geom 100
  end image
  begin image
    type menu
    mode image allow image auto
    state normal
    color white #000066
    file A_b_button1.png
    geom 100
    border 4 4 4 4
    state selected
    file A_b_title3.png
    geom 100
    border 4 4 4 4
  end image
  begin image
    type submenu
    mode image allow image auto
    state normal
    color white #000066
    file menu_arrow.png
    geom 100
    border 6 22 1 1
    padding 6 22 1 1
    state selected
    file menu_arrow_H.png
    geom 100
    border 6 22 1 1
    padding 6 22 1 1
  end image
  begin image
    type button_bar
    mode image allow image auto
    state normal
    color white #0000ff
    file A_b_button1.png
    geom 100
    border 4 4 4 4
  end image
  begin image
    type button
    mode image allow image auto
    state normal
    color white #0000ff
    file A_b_button1.png
    geom 100
    border 4 4 4 4
    state selected
    file A_b_title3.png
    geom 100
    border 4 4 4 4
  end image
end

%include "menus.cfg"

begin actions
  bind ctrl button1 to string "\e]5;\a"
  bind ctrl button2 to string "\e[?30t"
  bind ctrl button3 to menu Eterm
  bind ctrl shift button3 to string "\e]6;14\a"
end actions

begin button_bar
  font "-adobe-helvetica-medium-r-normal--10-100-75-75-p-56-iso8859-1"
  button Eterm action menu "Eterm Operations"
  button Font action menu Font
  button Background action menu Background
  button Terminal action menu Terminal
  button Help action script "spawn(Eterm -e man Eterm)"
end button_bar

