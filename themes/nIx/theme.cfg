begin toggles
  map_alert on
  visual_bell off
  login_shell true
  scrollbar on
  utmp_logging on
#  meta8 false
  iconic false
  home_on_output 1
  home_on_input 1
  scrollbar_right true
  scrollbar_floating false
  borderless false
end toggles

begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard

begin misc
#  print_pipe "lpr"
  save_lines 1024
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
#  line_space 2
  term_name Eterm
end misc
