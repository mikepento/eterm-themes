<Eterm-0.9.2>
# Estep - A NeXTStep-like theme for Eterm
begin color
    foreground #ffffff
    background black
    cursor #ffff00
    cursor_text #880000
    pointer white
    video normal
end color

begin attributes
    font default 2
    scrollbar_type next
    scrollbar_width 16
end attributes

begin imageclasses
    path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
    begin image
      type background
      state normal
      file %random(`cat pixmaps.list`)
      mode image allow image trans viewport auto
      border 0 0 0 0
    end image
    begin image
      type trough
      mode image allow image auto viewport trans
      state normal
      color #909090 #909090
      file next_sb_bg.png@+0+0:tiled
      border 0 0 0 0 
    end image
    begin image
      type anchor
      mode image allow image auto
      state normal
      color black #909090
      file next_scrollbar_vert.png
      geom 100
      border 2 2 2 2
      state selected
      file next_scrollbar_vert.png
      geom 100
      border 2 2 2 2
    end image
    begin image
      type thumb
      mode image allow image auto
      state normal
      color black #909090
      file next_scrollbar_dot.png
      geom 100
      border 3 3 3 3
      state selected
      file next_scrollbar_dot.png
      geom 100
      border 3 3 3 3
    end image
    begin image
      type up_arrow
      mode image allow image auto
      state normal
      color #909090 #909090
      file next_button_up.png
      geom 100
      border 1 1 1 1
      state selected
      file next_button_up.png
      geom 100
      border 1 1 1 1
      state clicked
      file next_button_up_selected.png
      geom 100
      border 1 1 1 1
    end image
    begin image
      type down_arrow
      mode image allow image auto
      state normal
      color #909090 #909090
      file next_button_down.png
      geom 100
      border 1 1 1 1
      state selected
      file next_button_down.png
      geom 100
      border 1 1 1 1
      state clicked
      file next_button_down_selected.png
      geom 100
      border 1 1 1 1
    end image
    begin image
      type menu
      mode image allow image auto
      state normal
      color black #909090
      file next_scrollbar_vert.png
      geom 100 
      border 2 3 2 3
      state selected
      file next_bar_selected.png
      geom 100
      border 2 3 2 3
    end image
    begin image
      type submenu
      mode image allow image auto
      state normal
      color black #999999
      file next_menu.png
      geom 100
      border 3 15 3 3
      padding 3 15 3 3
      state selected
      file next_menu_selected.png
      geom 100
      border 3 15 3 3
      padding 3 15 3 3
      state clicked
      file next_menu.png
      geom 100
      border 3 15 3 3
      padding 3 15 3 3
    end image
    begin image
      type button_bar
      mode solid allow solid auto
      state normal
      color black #909090
      geom 100
      border 12 12 12 12
      state disabled
      color white #909090
      geom 100
      border 12 12 12 12
    end image
    begin image
      type button
      mode image allow image auto solid
      state normal
      color black #909090
      geom 100
      border 2 3 2 2
      state selected
      color black #909090
      file next_bar_selected.png
      geom 100
      border 2 3 2 2
      state clicked
      file next_bar_selected.png
      geom 100
      border 2 3 2 2
    end image
end

%include "menus.cfg"

begin actions
    bind ctrl button1 to string "\e]5;\a"
    bind ctrl button2 to string "\e[?30t"
    bind ctrl button3 to menu Eterm
    bind ctrl shift button3 to string "\e]6;14\a"
end actions

begin button_bar
    font "-adobe-helvetica-medium-r-normal--10-100-75-75-p-56-iso8859-1"
    button Eterm action menu "Eterm Operations"
    button Font action menu Font
    button Background action menu Background
    button Terminal action menu Terminal
    rbutton icon help.png action script "spawn(Eterm -e man Eterm)"
    rbutton icon exit.png action script "exit"
end button_bar

begin toggles
    map_alert on
    visual_bell off
    login_shell true
    scrollbar on
    utmp_logging on
    select_line false
    iconic false
    home_on_output 1
    home_on_input 1
    scrollbar_right false
    scrollbar_floating false
    borderless false
end toggles

begin keyboard
    smallfont_key LessThan
    bigfont_key GreaterThan
end keyboard

begin misc
  min_anchor_size 16
  save_lines 1024
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
  term_name Eterm
end misc
