<Eterm-0.9.2>

begin color
    foreground #aaaaaa
    background #758c89
    cursor #ffff00
    cursor_text #880000
    pointer white
    video normal
    color 0 #000000
    color 1 #9e1828
    color 2 #9e1828
    color 3 #968a38
    color 4 #414171
    color 5 #963c59
    color 6 #418179
    color 7 gray
    color 8 gray40
    color 9 #cf6171
    color 10 #c5f779
    color 11 #fff796
    color 12 #4186be
    color 13 #cf9ebe
    color 14 #71bebe
    color 15 #ffffff
    color bd #ffffff
end color

begin attributes
    title %appname() -- BrassAlloy Theme
    scrollbar_type motif
    scrollbar_width 10
    font default 2
end attributes

begin imageclasses
    path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
    begin image
      type background
      mode image allow image trans viewport
      state normal
      file pix/clancarving.jpg
      geom 0x0+0+0:tiled
    end image
    begin image
      type up_arrow
      mode image allow image auto
      state normal
      color #000000 #666666
      file pix/up1.png
      geom 100
      border 2 2 2 2
      state selected
      color #000000 #666666
      file pix/up2.png
      geom 100
      border 2 2 2 2
      state clicked
      color #000000 #666666
      file pix/up1.png
      geom 100
      border 2 2 2 2
    end image
    begin image
      type down_arrow
      mode image allow image auto
      state normal
      color #000000 #666666
      file pix/down1.png
      geom 100
      border 2 2 2 2
      state selected
      color #000000 #666666
      file pix/down2.png
      geom 100
      border 2 2 2 2
      state clicked
      color #000000 #666666
      file pix/down1.png
      geom 100
      border 2 2 2 2
    end image
    begin image
      type trough
      mode image allow image trans viewport auto
      state normal
      color #000000 #666666
      file pix/vert.png
      geom 100
      border 2 2 2 3
    end image
    begin image
      type anchor
      mode image allow image auto
      state normal
      color #000000 #666666
      file pix/vert.png
      geom 100
      border 2 2 2 3
      state selected
      color #000000 #666666
      file pix/vert.png
      geom 100
      border 2 2 2 3
      state clicked
      color #000000 #666666
      file pix/vert.png
      geom 100
      border 2 2 2 3
    end image
    begin image
      type menu
      mode image allow image auto
      state normal
      color #aaaaaa #999999
      file pix/hor.png
      geom 100
      border 2 3 2 3
      state selected
      color #ffffff #999999
      file pix/hor.png
      geom 100
      border 2 3 2 3
      state clicked
      color #aaaaaa #999999
      file pix/hor.png
      geom 100
      border 2 3 2 3
    end image
    begin image
      type menuitem
      mode solid
      state normal
      color #aaaaaa #000000
      geom 0x0+0+0
    end image
    begin image
      type submenu
      mode image allow image auto
      state normal
      color #aaaaaa #999999
      file pix/hor.png
      geom 100
      state selected
      color #ffffff #999999
      file pix/hor.png
      geom 100
      state clicked
      color #aaaaaa #999999
      file pix/hor.png
      geom 100
    end image
    begin image
      type button
      mode image allow image auto
      state normal
      color #aaaaaa #cccccc
      file pix/hor.png
      geom 100
      state selected
      color #ffffff #cccccc
      file pix/hor.png
      geom 100
      state clicked
      color #aaaaaa #cccccc
      file pix/hor.png
      geom 100
    end image
    begin image
      type button_bar
      mode image allow image auto
      state normal
      color #aaaaaa #999999
      file pix/hor.png
      geom 100
      state disabled
      color #888888 #333333
      file pix/hor.png
      geom 100
      colormod image 0xc0 0x100 0x100
    end image
end imageclasses

%include "menus.cfg"

begin actions
    bind ctrl shift button3 to string '^[]6;14^G'
    bind ctrl button3 to menu "Eterm"
    bind ctrl button2 to string '^[[?30t'
    bind ctrl button1 to string '^[]5;^G'
end actions

begin button_bar
    button "Eterm" action menu "Eterm Operations"
    button "Font" action menu "Font"
    button "Background" action menu "Background"
    button "Terminal" action menu "Terminal"
    rbutton icon "pix/exit.png" action script 'exit'
end button_bar

begin toggles
    login_shell 1
    utmp_logging 1
    home_on_output 1
    home_on_input 1
    scrollbar_floating 1
    scrollbar_right 1
end toggles

begin keyboard
    smallfont_key less
    bigfont_key greater
    app_keypad 0
    app_cursor 0
end keyboard

begin misc
    print_pipe 'lp'
    save_lines 256
    min_anchor_size 0
    border_width 5
    term_name Eterm
end misc
