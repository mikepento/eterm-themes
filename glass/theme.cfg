<Eterm-0.9.2>

begin color
  foreground #aaaaaa
  background black
  cursor #ffff00
  cursor_text #880000
  pointer white
  video normal
end color
begin attributes
  title "%appname() -- Glass Theme"
  name Eterm
  font default 2
end attributes
begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode trans allow trans auto
    state normal
    bevel up 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type trough
    mode trans allow trans auto
    state normal
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type anchor
    mode trans allow trans auto
    state normal
    cmod red 0xc0
    cmod green 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    cmod blue 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    cmod blue 0x120
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type thumb
    mode trans allow trans auto
    state normal
    bevel down 2 2 2 2
    state selected
    bevel up 2 2 2 2
    state clicked
    bevel up 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type up_arrow
    mode trans allow trans auto
    state normal
    cmod red 0xc0
    cmod green 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    cmod blue 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    cmod blue 0x120
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type down_arrow
    mode trans allow trans auto
    state normal
    cmod red 0xc0
    cmod green 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    cmod blue 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    cmod blue 0x120
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type menu
    mode trans allow trans auto
    state normal
    color white black
    cmod image 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type submenu
    mode trans allow trans auto
    state normal
    color white black
    cmod image 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    bevel down 2 2 2 2
  end image
  begin image
    type button_bar
    mode trans allow trans auto
    state normal
    color white black
    cmod image 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
  begin image
    type button
    mode trans allow trans auto
    state normal
    color white black
    cmod image 0xc0
    bevel up 2 2 2 2
    state selected
    cmod image 0x120
    bevel up 2 2 2 2
    state clicked
    cmod image 0x120
    bevel down 2 2 2 2
    state disabled
    cmod image 0xa0
  end image
end
%include "menus.cfg"
begin actions
  bind ctrl button1 to string "\e]5;\a"
  bind ctrl button2 to string "\e[?30t"
  bind ctrl button3 to menu Eterm
  bind ctrl shift button3 to string "\e]6;14\a"
end actions
begin button_bar
  font "-adobe-helvetica-medium-r-normal--10-100-75-75-p-56-iso8859-1"
  button Eterm action menu "Eterm Operations"
  button Font action menu Font
  button Background action menu Background
  button Terminal action menu Terminal
  rbutton Help action script "spawn(Eterm -e man Eterm)"
  rbutton Exit action script "exit()"
end button_bar
begin toggles
  map_alert on
  visual_bell on
  login_shell true
  scrollbar on
  utmp_logging on
  iconic false
  home_on_output 1
  home_on_input 1
  scrollbar_right true
  scrollbar_floating true
  borderless true
  itrans true
end toggles
begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard
begin misc
  save_lines 64
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
  term_name Eterm
end misc
