<Eterm-0.9.2>

%put(BG_CMOD_NORMAL 0x40)
%put(BG_CMOD_FOCUSED 0xa0)
%put(BG_CMOD_DISABLED 0x100)

%include "/usr/share/Eterm/themes/Eterm/menus.cfg"
begin color
  foreground #aaaaaa
  background black
  cursor #ffff00
  cursor_text #880000
  pointer white
  video normal
end color
begin attributes
  title "%appname() -- Glass Theme"
  name Eterm
  font fx outline black
end attributes
begin imageclasses
  path "./pix/:~/.Eterm/:~/.Eterm/themes/Eterm/pix:~/.Eterm/pix/:/usr/share/Eterm/pix/"
  begin image
    type background
    mode trans allow trans auto
    state normal
    bevel up 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type trough
    mode trans allow trans auto
    state normal
    bevel down 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type anchor
    mode trans allow trans auto
    state normal
    cmod red 0xc0
    cmod green 0xc0
    bevel up 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type thumb
    mode trans allow trans auto
    state normal
    bevel down 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state selected
    bevel up 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state clicked
    bevel up 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type up_arrow
    mode trans allow trans auto
    state normal
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state selected
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state clicked
    bevel down 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type down_arrow
    mode trans allow trans auto
    state normal
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state selected
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state clicked
    cmod image %get(BG_CMOD_NORMAL)
    bevel down 2 2 2 2
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type menu
    mode trans allow trans auto
    state normal
    color white black
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state selected
    cmod image %get(BG_CMOD_FOCUSED)
    bevel up 2 2 2 2
    state clicked
    cmod image %get(BG_CMOD_FOCUSED)
    bevel down 2 2 2 2
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type submenu
    mode trans allow trans auto
    state normal
    color white black
    bevel up 2 2 2 2
    cmod image %get(BG_CMOD_NORMAL)
    state selected
    bevel up 2 2 2 2
    cmod image %get(BG_CMOD_FOCUSED)
    state clicked
    bevel down 2 2 2 2
    cmod image %get(BG_CMOD_FOCUSED)
  end image
  begin image
    type button_bar
    mode trans allow trans auto
    state normal
    color white black
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state selected
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state clicked
    cmod image %get(BG_CMOD_NORMAL)
    bevel down 2 2 2 2
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
  begin image
    type button
    mode trans allow trans auto
    state normal
    color white black
    cmod image %get(BG_CMOD_NORMAL)
    bevel up 2 2 2 2
    state selected
    cmod image %get(BG_CMOD_FOCUSED)
    bevel up 2 2 2 2
    state clicked
    cmod image %get(BG_CMOD_FOCUSED)
    bevel down 2 2 2 2
    state disabled
    cmod image %get(BG_CMOD_DISABLED)
  end image
end

begin actions
  bind ctrl button1 to string "\e]5;\a"
  bind ctrl button2 to string "\e[?30t"
  bind ctrl button3 to menu Eterm
  bind ctrl shift button3 to string "\e]6;14\a"
end actions
begin button_bar
  font "-adobe-helvetica-medium-r-normal--12-*-75-75-p-*-*"
  button Eterm action menu "Eterm Operations"
  button Font action menu Font
  button Background action menu Background
  button Terminal action menu Terminal
  rbutton Help action script "spawn(Eterm -e man Eterm)"
  rbutton Exit action script "exit()"
end button_bar
begin toggles
  map_alert on
  visual_bell on
  login_shell true
  scrollbar on
  utmp_logging on
  iconic false
  home_on_output 1
  home_on_input 1
  scrollbar_right true
  scrollbar_floating true
  borderless true
  itrans true
end toggles
begin keyboard
  smallfont_key LessThan
  bigfont_key GreaterThan
end keyboard
begin misc
  save_lines 64
  cut_chars "\t\\\`\\\"\'&() *,;<=>?@[]{|}"
  border_width 5
  term_name Eterm
end misc

begin color
    es_current "#ffff00"
    es_active  "#0000ff"
end color

begin attributes
    name "%appname() -- Escreen Session"
end attributes

begin menu
    title Escreen
    begin menuitem
        text "New"
        action script "es_display(new)"
    end
    begin menuitem
        text "New..."
        action script "es_display(new, ask)"
    end
    begin menuitem
        text "Rename..."
        action script "es_display(name, ask)"
    end
    begin menuitem
        text "Backlog..."
        action script "es_display(backlog)"
    end
    begin menuitem
        text "Monitor"
        action script "es_display(monitor)"
    end
    begin menuitem
        text "Close"
        action script "es_display(close)"
    end
    -
    begin menuitem
        text "Split"
        action script "es_region(new)"
    end
    begin menuitem
        text "Unsplit"
        action script "es_region(full)"
    end
    begin menuitem
        text "Prev region"
        action script "es_region(prev)"
    end
    begin menuitem
        text "Next region"
        action script "es_region(next)"
    end
    begin menuitem
        text "Kill region"
        action script "es_region(kill)"
    end
    -
    begin menuitem
        text "Reset"
        action script "es_reset()"
    end
    begin menuitem
        text "Statement"
        action script "es_statement()"
    end
    -
    begin menuitem
        text "About..."
        action script "msgbox(Screen/Twin compatibility layer by Azundris <scream@azundris.com>)"
    end
end menu

begin actions
    bind alt Left to script "es_display(prev)"
    bind alt Right to script "es_display(next)"
    bind alt Up to script "es_region(prev)"
    bind alt Down to script "es_region(next)"
    bind alt Prior to script "es_display(prev)"
    bind alt Next to script "es_display(next)"
    bind alt space to script "es_display(toggle)"
    bind ctrl Tab to script "es_display(next)"
    bind ctrl t to script "es_display(new, ask)"

    # alt-1..alt-0 -> display(0)..display(9)
    bind alt 0x31 to script "es_display(goto, 0)"
    bind alt 0x32 to script "es_display(goto, 1)"
    bind alt 0x33 to script "es_display(goto, 2)"
    bind alt 0x34 to script "es_display(goto, 3)"
    bind alt 0x35 to script "es_display(goto, 4)"
    bind alt 0x36 to script "es_display(goto, 5)"
    bind alt 0x37 to script "es_display(goto, 6)"
    bind alt 0x38 to script "es_display(goto, 7)"
    bind alt 0x39 to script "es_display(goto, 8)"
    bind alt 0x30 to script "es_display(goto, 9)"

    # Commented out; too intrusive -- mej
    # F1..F10 -> display(0)..display(9)
    #bind F1 to script "es_display(goto, 0)"
    #bind F2 to script "es_display(goto, 1)"
    #bind F3 to script "es_display(goto, 2)"
    #bind F4 to script "es_display(goto, 3)"
    #bind F5 to script "es_display(goto, 4)"
    #bind F6 to script "es_display(goto, 5)"
    #bind F7 to script "es_display(goto, 6)"
    #bind F8 to script "es_display(goto, 7)"
    #bind F9 to script "es_display(goto, 8)"
    #bind F10 to script "es_display(goto, 9)"

    bind alt n to script "es_display(new)"
    bind alt r to script "es_display(rename)"
    bind alt c to script "es_display(kill, ask)"
    bind alt m to script "es_display(watch)"
    bind alt b to script "es_display(backlog)"

    bind alt s to script "es_region(new)"
    bind alt u to script "es_region(full)"
    bind alt o to script "es_region(next)"
    bind alt k to script "es_region(kill, ask)"

    bind alt shift S to script "es_statement()"
    bind alt shift R to script "es_reset()"
end actions

begin escreen
    url ""
    #delay 2
    #bbar_dock bottom
    bbar_font "-adobe-helvetica-medium-r-normal--12-*-75-75-p-*-*"
end escreen
